<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>photos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="viewer">
  <img id="photo" src="photos/1.jpg">
</div>

<script>
const images = [];
for (let i = 1; i <= 24; i++) {
  images.push(`photos/${i}.jpg`);
}

let index = 0;
const photo = document.getElementById("photo");

/* groups */
const scale12 = [1,4,7,10,16,19,20,21]; // images 2,5,8,11,17,20,21,22 (0-based)

/* scale */
function getScale(i){
  if(i === 0) return 1;
  if(scale12.includes(i)) return 1.2;
  return 1.4;
}

/* drift intensity */
function getDrift(i){
  if(i === 0) return 0;
  if(scale12.includes(i)) return 20;  // slower, calmer
  return 50;                          // more active
}

let scale = getScale(index);
let x = 0;
let y = 0;

function show(i){
  index = (i + images.length) % images.length;
  photo.src = images[index];
  scale = getScale(index);
  resetPosition();
}

/* navigation */
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight") show(index+1);
  if(e.key==="ArrowLeft") show(index-1);
});

photo.addEventListener("dblclick", ()=>show(index+1));

/* transform */
function update(){
  if(index === 0){
    photo.style.transform = "none";
    photo.style.maxWidth = "100%";
    photo.style.maxHeight = "100%";
    photo.style.objectFit = "contain";
  } else {
    photo.style.transform =
      `translate(${x}px, ${y}px) scale(${scale})`;
    photo.style.maxWidth = "none";
    photo.style.maxHeight = "none";
  }
}

function resetPosition(){
  x = 0;
  y = 0;
  update();
}

/* mouse drag */
let dragging = false;
let startX, startY;

document.addEventListener("mousedown", e=>{
  if(index === 0) return;
  dragging = true;
  startX = e.clientX - x;
  startY = e.clientY - y;
});

document.addEventListener("mousemove", e=>{
  if(!dragging) return;
  x = e.clientX - startX;
  y = e.clientY - startY;
  update();
});

document.addEventListener("mouseup", ()=>dragging=false);

/* touch drag */
document.addEventListener("touchstart", e=>{
  if(index === 0) return;
  startX = e.touches[0].clientX - x;
  startY = e.touches[0].clientY - y;
});

document.addEventListener("touchmove", e=>{
  if(index === 0) return;
  x = e.touches[0].clientX - startX;
  y = e.touches[0].clientY - startY;
  update();
});

/* drift */
function drift(){
  let intensity = getDrift(index);
  if(intensity === 0) return;

  let dx = (Math.random() - 0.5) * intensity;
  let dy = (Math.random() - 0.5) * intensity;
  x += dx;
  y += dy;
  update();
}

setInterval(drift, 2000);

update();
</script>

</body>
</html>
