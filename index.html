<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>photos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="viewer">
  <img id="photo" src="photos/1.jpg">
</div>

<script>
const images = [];
for (let i = 1; i <= 24; i++) {
  images.push(`photos/${i}.jpg`);
}

let index = 0;
const photo = document.getElementById("photo");

/* SCALE RULE */
function getScale(i){
  return (i === 0) ? 1 : 1.5;
}

let scale = getScale(index);
let x = 0;
let y = 0;

function show(i){
  index = (i + images.length) % images.length;
  photo.src = images[index];
  scale = getScale(index);
  resetPosition();
}

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight") show(index+1);
  if(e.key==="ArrowLeft") show(index-1);
});

photo.addEventListener("dblclick", ()=>show(index+1));

/* PAN */
function update(){
  photo.style.transform =
    `translate(${x}px, ${y}px) scale(${scale})`;
}

function resetPosition(){
  x = 0;
  y = 0;
  update();
}

/* mouse */
let dragging = false;
let startX, startY;

document.addEventListener("mousedown", e=>{
  dragging = true;
  startX = e.clientX - x;
  startY = e.clientY - y;
});

document.addEventListener("mousemove", e=>{
  if(!dragging) return;
  x = e.clientX - startX;
  y = e.clientY - startY;
  update();
});

document.addEventListener("mouseup", ()=>dragging=false);

/* touch */
document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX - x;
  startY = e.touches[0].clientY - y;
});

document.addEventListener("touchmove", e=>{
  x = e.touches[0].clientX - startX;
  y = e.touches[0].clientY - startY;
  update();
});

/* drift */
function drift(){
  let intensity = (index === 0) ? 10 : 40;
  let dx = (Math.random() - 0.5) * intensity;
  let dy = (Math.random() - 0.5) * intensity;
  x += dx;
  y += dy;
  update();
}

setInterval(drift, 2000);

update();
</script>

</body>
</html>
