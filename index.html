<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>photos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<img id="photo" src="photos/1.jpg">

<script>
const images = [
"photos/1.jpg",
"photos/2.jpg",
"photos/3.jpg",
"photos/4.jpg",
"photos/5.jpg",
"photos/6.jpg",
"photos/7.jpg",
"photos/8.jpg",
"photos/9.jpg",
"photos/10.jpg",
"photos/11.jpg",
"photos/12.jpg",
"photos/13.jpg",
"photos/14.jpg",
"photos/15.jpg",
"photos/16.jpg",
"photos/17.jpg",
"photos/18.jpg",
"photos/19.jpg",
"photos/20.jpg",
"photos/21.jpg",
"photos/22.jpg",
"photos/23.jpg",
"photos/24.jpg",
"photos/25.jpg",
"photos/26.jpg",
"photos/27.jpg"
];

let index = 0;
const photo = document.getElementById("photo");

function show(i){
index = (i + images.length) % images.length;
photo.src = images[index];
}

document.addEventListener("keydown", e=>{
if(e.key==="ArrowRight") show(index+1);
if(e.key==="ArrowLeft") show(index-1);
});

photo.addEventListener("click", ()=>show(index+1));

let startX = 0;

document.addEventListener("touchstart", e=>{
startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
let endX = e.changedTouches[0].clientX;
if(endX < startX-50) show(index+1);
if(endX > startX+50) show(index-1);
});
</script>

</body>
</html>
